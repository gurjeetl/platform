[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "genie-agent-sdk"
version = "0.1.0"
description = "Self-registering agent harness SDK for the Genie platform"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    "pydantic>=2.7",
    "langchain>=0.2",
    "langchain-core>=0.2",
    "langchain-openai>=0.1",
    "langchain-mcp-adapters>=0.1",
    "python-dotenv>=1.0",
    "mlflow>=2.9",
    "genie-agent-contracts",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "ruff>=0.4",
]

[tool.uv.sources]
genie-agent-contracts = { path = "../genie-agent-contracts", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/genie_agent_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
