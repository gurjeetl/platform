[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "genie-rag-contracts"
version = "0.1.0"
description = "Shared contracts for the genie RAG service boundary"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[tool.hatch.build.targets.wheel]
packages = ["src/genie_rag_contracts"]
