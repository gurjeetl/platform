repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        language: system
        entry: uv run ruff check --fix
        types_or: [python, pyi]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format
        types_or: [python, pyi]
        pass_filenames: true

      - id: mypy
        name: mypy type check
        language: system
        entry: uv run mypy
        types_or: [python, pyi]
        pass_filenames: true
        args: ["--ignore-missing-imports"]

      - id: lint-imports
        name: import-linter
        language: system
        entry: uv run lint-imports
        pass_filenames: false
        always_run: true
