# Milvus standalone for local dev (semantic long_term_memory).
#
# On Windows the in-process Milvus-Lite file mode is unavailable, so the platform
# talks to this server over gRPC at localhost:19530 (see config/dev-local.yaml:
# milvus_uri). Client is pinned to pymilvus 2.5.x, so this uses a Milvus 2.5.x
# server image for a matched client/server pairing.
#
# Start:   docker compose -f docker/milvus-standalone.yml up -d
# Health:  docker compose -f docker/milvus-standalone.yml ps
# Stop:    docker compose -f docker/milvus-standalone.yml down
# Wipe:    docker compose -f docker/milvus-standalone.yml down -v   (drops volumes)
#
# Data persists in ./docker/volumes/* (git-ignored). Milvus needs etcd (metadata)
# and MinIO (object storage) alongside the standalone node — all three below.

services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"   # gRPC — what pymilvus connects to
      - "9091:9091"     # metrics / health
    depends_on:
      - etcd
      - minio

networks:
  default:
    name: milvus
